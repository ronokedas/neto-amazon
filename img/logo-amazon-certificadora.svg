<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">Amazon Certificadora</title>
  <desc id="desc">Logomarca vetorial da Amazon Certificadora com timão naval, seta de rumo e textos institucionais.</desc>
  <defs>
    <linearGradient id="brandDark" x1="14%" y1="18%" x2="88%" y2="86%">
      <stop offset="0%" stop-color="#0b523f"/>
      <stop offset="44%" stop-color="#073626"/>
      <stop offset="100%" stop-color="#021d17"/>
    </linearGradient>
    <linearGradient id="brandMint" x1="10%" y1="85%" x2="88%" y2="12%">
      <stop offset="0%" stop-color="#27c995"/>
      <stop offset="100%" stop-color="#73f1bd"/>
    </linearGradient>
    <linearGradient id="brandText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b5944"/>
      <stop offset="52%" stop-color="#063723"/>
      <stop offset="100%" stop-color="#0b6b50"/>
    </linearGradient>
    <filter id="softDepth" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#softDepth)">
    <!-- Timão naval -->
    <g transform="translate(600 290)">
      <circle r="172" stroke="url(#brandDark)" stroke-width="34"/>
      <circle r="150" stroke="rgba(115,241,189,0.18)" stroke-width="2"/>

      <g stroke="url(#brandDark)" stroke-width="31">
        <line x1="0" y1="-253" x2="0" y2="-187"/>
        <line x1="0" y1="187" x2="0" y2="253"/>
        <line x1="-253" y1="0" x2="-187" y2="0"/>
        <line x1="187" y1="0" x2="253" y2="0"/>
        <line x1="-179" y1="-179" x2="-132" y2="-132"/>
        <line x1="132" y1="132" x2="179" y2="179"/>
        <line x1="179" y1="-179" x2="132" y2="-132"/>
        <line x1="-132" y1="132" x2="-179" y2="179"/>
      </g>

      <g fill="url(#brandDark)" stroke="none">
        <circle cx="0" cy="-268" r="22"/>
        <circle cx="0" cy="268" r="22"/>
        <circle cx="-268" cy="0" r="22"/>
        <circle cx="268" cy="0" r="22"/>
        <circle cx="-190" cy="-190" r="22"/>
        <circle cx="190" cy="190" r="22"/>
        <circle cx="190" cy="-190" r="22"/>
        <circle cx="-190" cy="190" r="22"/>
      </g>

      <!-- Seta/rumo -->
      <g transform="rotate(42)">
        <path d="M -34 210 L 0 -260 L 34 210 L 0 148 Z" fill="url(#brandMint)" stroke="#0b5f48" stroke-width="8"/>
        <path d="M 0 148 L 34 210 L 0 186 L -34 210 Z" fill="url(#brandDark)" stroke="#063323" stroke-width="6"/>
      </g>
    </g>
  </g>

  <!-- Palavra principal -->
  <g text-anchor="middle">
    <text x="600" y="705"
          fill="url(#brandText)"
          font-family="Montserrat, Poppins, Inter, Arial Black, sans-serif"
          font-size="156"
          font-weight="900"
          letter-spacing="12">AMAZON</text>

    <text x="600" y="820"
          fill="#c9f6e8"
          stroke="#0b5d48"
          stroke-width="1.7"
          paint-order="stroke fill"
          font-family="Montserrat, Poppins, Inter, Arial, sans-serif"
          font-size="58"
          font-weight="500"
          letter-spacing="36">CERTIFICADORA</text>

    <g transform="translate(600 912)">
      <line x1="-490" y1="0" x2="-390" y2="0" stroke="url(#brandMint)" stroke-width="8" stroke-linecap="round"/>
      <line x1="390" y1="0" x2="490" y2="0" stroke="url(#brandMint)" stroke-width="8" stroke-linecap="round"/>
      <text x="0" y="13"
            fill="#d7fff2"
            stroke="#0a5c47"
            stroke-width="1"
            paint-order="stroke fill"
            font-family="Montserrat, Poppins, Inter, Arial, sans-serif"
            font-size="28"
            font-weight="700"
            letter-spacing="10">RUMO CERTO. CONFIANÇA QUE CONDUZ.</text>
    </g>
  </g>
</svg>
