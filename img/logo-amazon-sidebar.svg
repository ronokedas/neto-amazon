<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 130" role="img" aria-labelledby="title desc">
  <title id="title">Amazon Certificadora</title>
  <desc id="desc">Versão horizontal compacta da marca Amazon Certificadora para navegação interna.</desc>
  <defs>
    <linearGradient id="dark" x1="10%" y1="20%" x2="90%" y2="82%">
      <stop offset="0%" stop-color="#0b5b45"/>
      <stop offset="52%" stop-color="#073725"/>
      <stop offset="100%" stop-color="#021d17"/>
    </linearGradient>
    <linearGradient id="mint" x1="10%" y1="90%" x2="88%" y2="10%">
      <stop offset="0%" stop-color="#27c995"/>
      <stop offset="100%" stop-color="#73f1bd"/>
    </linearGradient>
  </defs>

  <g transform="translate(64 61)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle r="36" stroke="url(#dark)" stroke-width="8"/>
    <g stroke="url(#dark)" stroke-width="7">
      <line x1="0" y1="-55" x2="0" y2="-40"/>
      <line x1="0" y1="40" x2="0" y2="55"/>
      <line x1="-55" y1="0" x2="-40" y2="0"/>
      <line x1="40" y1="0" x2="55" y2="0"/>
      <line x1="-39" y1="-39" x2="-28" y2="-28"/>
      <line x1="28" y1="28" x2="39" y2="39"/>
      <line x1="39" y1="-39" x2="28" y2="-28"/>
      <line x1="-28" y1="28" x2="-39" y2="39"/>
    </g>
    <g fill="url(#dark)" stroke="none">
      <circle cx="0" cy="-59" r="5"/>
      <circle cx="0" cy="59" r="5"/>
      <circle cx="-59" cy="0" r="5"/>
      <circle cx="59" cy="0" r="5"/>
      <circle cx="-42" cy="-42" r="5"/>
      <circle cx="42" cy="42" r="5"/>
      <circle cx="42" cy="-42" r="5"/>
      <circle cx="-42" cy="42" r="5"/>
    </g>
    <g transform="rotate(42)">
      <path d="M -7 45 L 0 -58 L 8 45 L 0 32 Z" fill="url(#mint)" stroke="#0a5c47" stroke-width="2"/>
    </g>
  </g>

  <g>
